<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alpage</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: #ffffff;
    }

    .bg-logo {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .bg-logo img {
      width: 65%;
      max-width: 700px;
      opacity: 0.12;
      object-fit: contain;
    }

    .contact-bar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 50px;
      padding: 14px 32px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.07);
    }

    .envelope-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      color: #1a3a5c;
    }

    .contact-bar a {
      font-size: 17px;
      color: #1a3a5c;
      text-decoration: none;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: opacity 0.2s;
    }

    .contact-bar a:hover {
      opacity: 0.6;
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .bg-logo img { width: 90%; }
      .contact-bar { padding: 12px 22px; }
      .contact-bar a { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="bg-logo">
      <img src="logo.png" alt="Logo Alpage" />
    </div>

    <div class="contact-bar">
      <svg class="envelope-icon" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="M2 7l10 7 10-7"/>
      </svg>
      <a href="mailto:alain@alpage.com.br">alain@alpage.com.br</a>
    </div>

  </div>
</body>
</html>
